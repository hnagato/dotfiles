customCommands:
  - key: "C"
    context: "files"
    command: "czg ai"
    output: terminal
    description: "AI generated commit with czg"
  - key: "v"
    context: "localBranches"
    command: "gh pr view -w {{.SelectedLocalBranch.Name}}"
    description: "Open GitHub PR for selected branch"
  - key: "v"
    context: "commits"
    command: "sh -c 'gh pr view -w 2>/dev/null || gh browse'"
    description: "Open current PR or repository in browser"
git:
  pagers:
    #- pager: delta --paging=never --light --line-numbers --features=gruvbox-light-hard --navigate
    - pager: delta --paging=never --light --line-numbers --navigate
      useConfig: false
  branchLogCmd: git log --graph --color=always --pretty=format:'%C(yellow)%h%Cblue%d%Creset %s %C(green)%an %C(green bold)%ar%Creset' {{branchName}} --
  allBranchesLogCmds:
    - git log --graph --color=always --pretty=format:'%C(yellow)%h%Cblue%d%Creset %s %C(green)%an %C(green bold)%ar%Creset' --
  disableForcePush: true
gui:
  theme:
    activeBorderColor:
      - "#458588"
    inactiveBorderColor:
      - "#928374"
    searchingActiveBorderColor:
      - "#d79921"
    selectedLineBgColor:
      - "#ebdbb2"
    selectedRangeBgColor:
      - "#d5c4a1"
    cherryPickedCommitBgColor:
      - "#98971a"
    cherryPickedCommitFgColor:
      - "#3c3836"
    unstagedChangesColor:
      - "#cc241d"
    defaultFgColor:
      - "#3c3836"
    optionsTextColor:
      - "#076678"
    # reflog
    markedBaseCommitBgColor:
      - "#98971a"
    markedBaseCommitFgColor:
      - "#3c3836"
  # reflog authors
  authorColors:
    "hnagato": "#689d6a"
